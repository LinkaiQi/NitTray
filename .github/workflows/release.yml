name: Release

# Builds NitTray for both x64 and ARM64 — the .NET tray app plus the native
# WinUSB installer helper (C + libwdi) — and (once Azure Artifact Signing is
# configured) signs everything, then publishes a per-architecture zip.
#
# Triggered by pushing a version tag like v0.1.0, or run manually from the Actions
# tab. Signing stays OFF until you set the repo variable ARTIFACT_SIGNING=true and
# configure the Azure inputs below — until then the job still publishes UNSIGNED
# artifacts so the workflow stays green. See docs/SIGNING.md.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # attach binaries to a GitHub Release on tag builds
  id-token: write   # OIDC token for Azure login (Artifact Signing)

jobs:
  build:
    runs-on: windows-latest   # Artifact Signing requires a Windows runner
    environment: release      # stable OIDC subject (repo:OWNER/REPO:environment:release)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Build the elevated WinUSB installer helper (C + libwdi) once. -SupportArm64
      # additionally embeds the ARM64 installer payload, so the single x64 helper
      # installs the correct driver on BOTH x64 and ARM64 (libwdi selects
      # installer_<os-arch>.exe at runtime, even under x64 emulation on ARM).
      #
      # The finished helper exe is cached and reused across runs — keyed on the
      # helper sources + build.ps1 (which pins the libwdi tag) — so the slow libwdi
      # clone + build only happens when one of those changes, saving several Windows
      # minutes per release. The .csproj bundles the exe into every publish, so it
      # must exist before publish.
      - name: Restore cached native helper
        id: helper-cache
        uses: actions/cache/restore@v4
        with:
          path: native/NitTray.DriverSetup/dist
          key: nittray-helper-${{ runner.os }}-arm64-${{ hashFiles('native/NitTray.DriverSetup/build.ps1', 'native/NitTray.DriverSetup/main.c', 'native/NitTray.DriverSetup/resources.rc', 'native/NitTray.DriverSetup/CMakeLists.txt', 'native/NitTray.DriverSetup/NitTray.DriverSetup.manifest') }}

      - name: Build native WinUSB installer helper (libwdi, x64 + ARM64)
        if: steps.helper-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: ./native/NitTray.DriverSetup/build.ps1 -SupportArm64

      - name: Verify native helper is present
        shell: pwsh
        run: |
          if (-not (Test-Path native/NitTray.DriverSetup/dist/NitTray.DriverSetup.exe)) {
            throw "native helper missing — cache restore and build both failed to provide it"
          }

      # Only persist a freshly built helper (skipped on a cache hit). Placing the
      # save here rather than at job-post means a failed build never caches a bad
      # or empty dist folder.
      - name: Save native helper to cache
        if: steps.helper-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: native/NitTray.DriverSetup/dist
          key: ${{ steps.helper-cache.outputs.cache-primary-key }}

      - name: Publish x64 (self-contained, single file)
        run: >
          dotnet publish src/NitTray -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/win-x64

      - name: Publish ARM64 (self-contained, single file)
        run: >
          dotnet publish src/NitTray -c Release -r win-arm64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/win-arm64

      # --- Azure Artifact Signing (formerly Trusted Signing) -------------------
      # Enable by setting repo variable ARTIFACT_SIGNING=true plus the account/
      # profile variables and OIDC secrets (docs/SIGNING.md). DefaultAzureCredential
      # picks up the azure/login session below.
      - name: Azure login (OIDC)
        if: vars.ARTIFACT_SIGNING == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign x64 with Azure Artifact Signing
        if: vars.ARTIFACT_SIGNING == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\publish\win-x64
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign ARM64 with Azure Artifact Signing
        if: vars.ARTIFACT_SIGNING == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\publish\win-arm64
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Zip each architecture's app + helper together. The tray app looks for
      # NitTray.DriverSetup.exe next to itself, so the binaries must ship as a pair.
      # Runs after signing so the archives contain the signed binaries.
      - name: Package (zip per architecture)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          foreach ($rid in 'win-x64', 'win-arm64') {
            $items = Get-ChildItem "publish/$rid" -Exclude *.pdb
            Compress-Archive -Path $items.FullName -DestinationPath "NitTray-$tag-$rid.zip" -Force
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NitTray-win
          path: publish

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            NitTray-${{ github.ref_name }}-win-x64.zip
            NitTray-${{ github.ref_name }}-win-arm64.zip
