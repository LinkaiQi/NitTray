name: Release

# Builds NitTray for both x64 and ARM64 — the .NET tray app plus the native
# WinUSB installer helper (C + libwdi) — and (once Azure Artifact Signing is
# configured) signs everything, then publishes a per-architecture zip.
#
# Triggered by pushing a version tag like v0.1.0, or run manually from the Actions
# tab. Signing stays OFF until you set the repo variable ARTIFACT_SIGNING=true and
# configure the Azure inputs below — until then the job still publishes UNSIGNED
# artifacts so the workflow stays green. See docs/SIGNING.md.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # attach binaries to a GitHub Release on tag builds
  id-token: write   # OIDC token for Azure login (Artifact Signing)

jobs:
  build:
    runs-on: windows-2022   # VS 2022 v143 x64+ARM64 tools for the libwdi helper; Windows runner for Artifact Signing
    environment: release      # stable OIDC subject (repo:OWNER/REPO:environment:release)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Build the elevated WinUSB installer helper (C + libwdi) once. -SupportArm64
      # additionally embeds the ARM64 installer payload, so the single x64 helper
      # installs the correct driver on BOTH x64 and ARM64 (libwdi selects
      # installer_<os-arch>.exe at runtime, even under x64 emulation on ARM). Built
      # with MSBuild + CMake, located via vswhere; needs the "MSVC v143 - ARM64
      # build tools" component, which the windows-2022 image includes (windows-latest
      # has migrated to VS 18 and no longer ships the v143 ARM64 toolset). Stages
      # src/driver/dist/NitTray.DriverSetup.exe, which the app
      # .csproj bundles into every publish — so this MUST run before publish.
      - name: Build native WinUSB installer helper (libwdi, x64 + ARM64)
        shell: pwsh
        run: |
          ./src/driver/build.ps1 -SupportArm64
          if (-not (Test-Path src/driver/dist/NitTray.DriverSetup.exe)) {
            throw "native helper build did not produce NitTray.DriverSetup.exe"
          }

      - name: Publish x64 (self-contained, single file)
        run: >
          dotnet publish src/client -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/win-x64

      - name: Publish ARM64 (self-contained, single file)
        run: >
          dotnet publish src/client -c Release -r win-arm64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/win-arm64

      # --- Azure Artifact Signing (formerly Trusted Signing) -------------------
      # Enable by setting repo variable ARTIFACT_SIGNING=true plus the account/
      # profile variables and OIDC secrets (docs/SIGNING.md). DefaultAzureCredential
      # picks up the azure/login session below.
      - name: Azure login (OIDC)
        if: vars.ARTIFACT_SIGNING == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign x64 with Azure Artifact Signing
        if: vars.ARTIFACT_SIGNING == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\publish\win-x64
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign ARM64 with Azure Artifact Signing
        if: vars.ARTIFACT_SIGNING == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\publish\win-arm64
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Build a per-architecture Inno Setup installer from the (already signed)
      # publish output. Inno Setup isn't guaranteed on the runner, so install it via
      # Chocolatey. Each installer embeds that arch's app + helper and adds a Start
      # Menu shortcut, an optional run-at-sign-in entry, and an uninstaller.
      - name: Build installers (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          $tag = "${{ github.ref_name }}"
          $version = ($tag -replace '^v', '')
          if ($version -notmatch '^\d+(\.\d+){1,3}$') { $version = '0.0.0' }
          foreach ($arch in 'x64', 'arm64') {
            & $iscc `
              "/DMyAppVersion=$version" `
              "/DMyArch=$arch" `
              "/DSourceDir=$($PWD.Path)\publish\win-$arch" `
              "/DOutputBase=NitTray-$tag-setup-$arch" `
              installer\NitTray.iss
            if ($LASTEXITCODE -ne 0) { throw "ISCC failed for $arch" }
          }

      - name: Sign installers with Azure Artifact Signing
        if: vars.ARTIFACT_SIGNING == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\installer\output
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Also offer a portable zip per architecture (app + helper together). The
      # tray app looks for NitTray.DriverSetup.exe next to itself, so the binaries
      # must ship as a pair. Runs after signing so the archives contain signed exes.
      - name: Package portable zips (per architecture)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          foreach ($rid in 'win-x64', 'win-arm64') {
            $items = Get-ChildItem "publish/$rid" -Exclude *.pdb
            Compress-Archive -Path $items.FullName -DestinationPath "NitTray-$tag-$rid.zip" -Force
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: NitTray-win
          path: |
            publish
            installer/output

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            installer/output/NitTray-${{ github.ref_name }}-setup-x64.exe
            installer/output/NitTray-${{ github.ref_name }}-setup-arm64.exe
            NitTray-${{ github.ref_name }}-win-x64.zip
            NitTray-${{ github.ref_name }}-win-arm64.zip
