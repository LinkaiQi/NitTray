name: Release

# Builds NitTray — the .NET tray app plus the native WinUSB installer helper
# (C + libwdi) — and (once Azure Artifact Signing is configured) signs both, then
# publishes a zip containing the two binaries.
#
# Triggered by pushing a version tag like v0.1.0, or run manually from the Actions
# tab. Signing stays OFF until you set the repo variable ARTIFACT_SIGNING=true and
# configure the Azure inputs below — until then the job still publishes UNSIGNED
# artifacts so the workflow stays green. See docs/SIGNING.md.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # attach binaries to a GitHub Release on tag builds
  id-token: write   # OIDC token for Azure login (Artifact Signing)

jobs:
  build:
    runs-on: windows-latest   # Artifact Signing requires a Windows runner
    environment: release      # stable OIDC subject (repo:OWNER/REPO:environment:release)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Build the elevated WinUSB installer helper (C + libwdi). build.ps1 clones
      # and patches libwdi, then builds it and the helper with MSBuild + CMake —
      # located via vswhere, and windows-latest ships VS 2022 with the C++ workload
      # so no extra setup is needed. It stages
      # native/NitTray.DriverSetup/dist/NitTray.DriverSetup.exe, which the app
      # .csproj bundles automatically — so this MUST run before the publish step.
      - name: Build native WinUSB installer helper (libwdi)
        shell: pwsh
        run: |
          ./native/NitTray.DriverSetup/build.ps1
          if (-not (Test-Path native/NitTray.DriverSetup/dist/NitTray.DriverSetup.exe)) {
            throw "native helper build did not produce NitTray.DriverSetup.exe"
          }

      - name: Publish (self-contained, win-x64)
        run: >
          dotnet publish src/NitTray -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/win-x64

      # --- Azure Artifact Signing (formerly Trusted Signing) -------------------
      # Enable by setting repo variable ARTIFACT_SIGNING=true plus the account/
      # profile variables and OIDC secrets (docs/SIGNING.md). DefaultAzureCredential
      # picks up the azure/login session below.
      - name: Azure login (OIDC)
        if: vars.ARTIFACT_SIGNING == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign with Azure Artifact Signing
        if: vars.ARTIFACT_SIGNING == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\publish\win-x64
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Zip the app + helper together. The tray app looks for
      # NitTray.DriverSetup.exe next to itself, so the two binaries must ship as a
      # pair. Runs after signing so the archive contains the signed binaries.
      - name: Package (zip app + helper)
        id: package
        shell: pwsh
        run: |
          $name = "NitTray-${{ github.ref_name }}-win-x64"
          $items = Get-ChildItem publish/win-x64 -Exclude *.pdb
          Compress-Archive -Path $items.FullName -DestinationPath "$name.zip" -Force
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip=$name.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NitTray-win-x64
          path: publish/win-x64

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip }}
