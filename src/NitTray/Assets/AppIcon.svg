  <g filter="url(#softShadow)">
    <rect x="21.33" y="53" width="213.33" height="150" rx="24" fill="url(#screen)"/>

    <!-- Brightness slider on the screen -->
    <rect x="51" y="116" width="152" height="22" rx="11" fill="#FFFFFF" fill-opacity="0.25"/>
    <rect x="51" y="116" width="53" height="22" rx="11" fill="#E3F2FD"/>
    <circle cx="104" cy="127" r="20" fill="#FFFFFF"/>
  </g>

